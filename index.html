<style>
:root{--primary:#e84040;--primary-light:#ff6b6b;--primary-dark:#c02a2a;--accent:#ff8c42;--bg:#fff8f5;--card-bg:#ffffff;--text:#2d2d2d;--text-muted:#888;--border:#f0e8e8;--star:#ffb300;--done:#4caf50;--radius:14px;--shadow:0 2px 12px rgba(232,64,64,0.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{background:var(--primary);color:white;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(232,64,64,0.3)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:18px;font-weight:700;letter-spacing:0.3px}
.app-title span{font-weight:300;opacity:0.8;font-size:13px;margin-left:4px}
.header-actions{display:flex;gap:8px}
.btn-icon{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;transition:background 0.2s}
.btn-icon:hover{background:rgba(255,255,255,0.3)}
.btn-icon.active{background:rgba(255,255,255,0.35)}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:80px;padding:10px 8px;background:none;border:none;color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;text-align:center}
.tab-btn.active{color:white;border-bottom-color:white;font-weight:700}
.search-bar{padding:12px 16px;background:var(--card-bg);border-bottom:1px solid var(--border)}
.search-input{width:100%;padding:9px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:14px;outline:none;background:var(--bg);color:var(--text);transition:border-color 0.2s}
.search-input:focus{border-color:var(--primary-light)}
.scene-filter{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;background:var(--card-bg);border-bottom:1px solid var(--border)}
.scene-filter::-webkit-scrollbar{display:none}
.scene-btn{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg);color:var(--text-muted);font-size:12px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.scene-btn.active{background:var(--primary);border-color:var(--primary);color:white;font-weight:600}
.dashboard{padding:12px 16px;background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
.dash-stat{display:flex;flex-direction:column;align-items:center;flex:1}
.dash-num{font-size:20px;font-weight:700;color:var(--primary)}
.dash-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.dash-bar{flex:2;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.dash-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 0.4s}
.cards-container{padding:12px 16px 80px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card-wrap{min-width:0;overflow:hidden;box-sizing:border-box}
.flip-card{width:100%;aspect-ratio:1.2/1;perspective:800px;cursor:pointer}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s ease}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;box-shadow:var(--shadow)}
.flip-front{background:var(--card-bg);border:1.5px solid var(--border)}
.flip-back{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;transform:rotateY(180deg)}
.card-cn{font-size:13px;font-weight:600;text-align:center;color:var(--text);line-height:1.4}
.card-scene-tag{font-size:10px;color:var(--text-muted);margin-top:6px;background:var(--bg);padding:2px 7px;border-radius:8px}
.card-en{font-size:12px;font-weight:600;text-align:center;line-height:1.5;word-break:break-word}
.card-hint{font-size:10px;opacity:0.75;margin-top:4px;text-align:center}
.card-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;z-index:2}
.card-action-btn{width:24px;height:24px;border:none;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:rgba(255,255,255,0.85);opacity:0.6}
.card-action-btn:hover{opacity:1;transform:scale(1.15)}
.card-action-btn.tagged-star{background:var(--star);opacity:1}
.card-action-btn.tagged-done{background:var(--done);opacity:1;color:white}
.flip-back .card-action-btn{background:rgba(255,255,255,0.25);color:white}
.flip-back .card-action-btn.tagged-star{background:var(--star)}
.flip-back .card-action-btn.tagged-done{background:var(--done)}
.speak-btn-front{position:absolute;bottom:6px;right:6px;width:26px;height:26px;border:none;border-radius:50%;background:rgba(232,64,64,0.1);color:var(--primary);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:2}
.speak-btn-front:hover{background:rgba(232,64,64,0.2);transform:scale(1.1)}
.flip-back .speak-btn-front{background:rgba(255,255,255,0.2);color:white}
body.listen-mode .flip-front .card-cn{filter:blur(4px);user-select:none}
body.listen-mode .flip-back .card-en{filter:blur(4px);user-select:none}
body.listen-mode .flip-card.flipped .card-en{filter:none}
.tab-panel{display:none}
.tab-panel.active{display:block}
.topics-list{padding:12px 16px 80px;display:flex;flex-direction:column;gap:16px}
.topic-card{background:var(--card-bg);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1.5px solid var(--border)}
.topic-date{font-size:11px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.topic-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:10px;line-height:1.4}
.topic-body{font-size:14px;line-height:1.8;color:var(--text)}
.topic-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.topic-btn{padding:7px 16px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
.topic-btn-speak{background:var(--primary);color:white}
.topic-btn-speak:hover{background:var(--primary-dark)}
.topic-btn-copy{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.topic-btn-copy:hover{border-color:var(--primary-light);color:var(--primary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(45,45,45,0.9);color:white;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes pulse-speak{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.speaking{animation:pulse-speak 0.6s infinite}
@media(min-width:600px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
</style>
</head>

// ============================================================
// State
// ============================================================
var currentTab = 0;
var listenMode = false;
var starOnly = false;
var sceneFilters = {0: '', 1: '', 2: ''};
var tagStates = loadState('tags');  // {id: 'star'|'done'|''}
var deletedIds = loadState('deleted');  // {id: true}

function getCardId(item, index) {
  return 't' + item.tab + '_' + index;
}

// ============================================================
// Render
// ============================================================
function getTabData(tab) {
  return DATA.filter(function(d, i) {
    return d.tab === tab && !deletedIds[getCardId(d, DATA.indexOf(d))];
  });
}

function getScenes(tab) {
  var scenes = [];
  var seen = {};
  DATA.forEach(function(d) {
    if (d.tab === tab && !seen[d.scene]) {
      seen[d.scene] = true;
      scenes.push(d.scene);
    }
  });
  return scenes;
}

function renderSceneFilter(tab) {
  var el = document.getElementById('scene-filter-' + tab);
  if (!el) return;
  var scenes = getScenes(tab);
  var html = '<button class="scene-btn' + (sceneFilters[tab] === '' ? ' active' : '') + '" onclick="setScene(' + tab + ', \'\')">全部</button>';
  scenes.forEach(function(s) {
    html += '<button class="scene-btn' + (sceneFilters[tab] === s ? ' active' : '') + '" onclick="setScene(' + tab + ', \'' + s.replace(/'/g, "\\'") + '\')">' + s + '</button>';
  });
  el.innerHTML = html;
}

function setScene(tab, scene) {
  sceneFilters[tab] = scene;
  renderSceneFilter(tab);
  filterCards(tab);
}

function filterCards(tab) {
  var query = (document.getElementById('search-' + tab) || {value:''}).value.toLowerCase();
  var scene = sceneFilters[tab] || '';
  var grid = document.getElementById('grid-' + tab);
  var empty = document.getElementById('empty-' + tab);
  if (!grid) return;
  var cards = grid.querySelectorAll('.card-wrap');
  var visible = 0;
  cards.forEach(function(wrap) {
    var cn = (wrap.dataset.cn || '').toLowerCase();
    var en = (wrap.dataset.en || '').toLowerCase();
    var sc = wrap.dataset.scene || '';
    var id = wrap.dataset.id;
    var tag = tagStates[id] || '';
    var matchQuery = !query || cn.includes(query) || en.includes(query);
    var matchScene = !scene || sc === scene;
    var matchStar = !starOnly || tag === 'star';
    if (matchQuery && matchScene && matchStar) {
      wrap.style.display = '';
      visible++;
    } else {
      wrap.style.display = 'none';
    }
  });
  if (empty) empty.style.display = visible === 0 ? '' : 'none';
  updateDash(tab);
}

function renderCards(tab) {
  var grid = document.getElementById('grid-' + tab);
  if (!grid) return;
  var html = '';
  DATA.forEach(function(d, i) {
    if (d.tab !== tab) return;
    var id = getCardId(d, i);
    if (deletedIds[id]) return;
    var tag = tagStates[id] || '';
    html += renderCard(d, i, id, tag);
  });
  grid.innerHTML = html;
  renderSceneFilter(tab);
  filterCards(tab);
  updateDash(tab);
}

function renderCard(d, i, id, tag) {
  var starClass = tag === 'star' ? ' tagged-star' : '';
  var doneClass = tag === 'done' ? ' tagged-done' : '';
  return '<div class="card-wrap" data-id="' + id + '" data-cn="' + escHtml(d.cn) + '" data-en="' + escHtml(d.en) + '" data-scene="' + escHtml(d.scene) + '">' +
    '<div class="flip-card" id="card-' + id + '" onclick="flipCard(\'' + id + '\')">' +
      '<div class="flip-inner">' +
        '<div class="flip-front">' +
          '<div class="card-actions">' +
            '<button class="card-action-btn' + starClass + '" onclick="tagCard(event,\'' + id + '\',\'star\')" title="重要">⭐</button>' +
            '<button class="card-action-btn' + doneClass + '" onclick="tagCard(event,\'' + id + '\',\'done\')" title="掌握">✅</button>' +
            '<button class="card-action-btn" onclick="deleteCard(event,\'' + id + '\')" title="删除">🗑</button>' +
          '</div>' +
          '<div class="card-cn">' + escHtml(d.cn) + '</div>' +
          '<div class="card-scene-tag">' + escHtml(d.scene) + '</div>' +
          '<button class="speak-btn-front" onclick="speakText(event,\'' + escJs(d.en) + '\')" title="朗读">🔈</button>' +
        '</div>' +
        '<div class="flip-back">' +
          '<div class="card-actions">' +
            '<button class="card-action-btn' + starClass + '" onclick="tagCard(event,\'' + id + '\',\'star\')" title="重要">⭐</button>' +
            '<button class="card-action-btn' + doneClass + '" onclick="tagCard(event,\'' + id + '\',\'done\')" title="掌握">✅</button>' +
          '</div>' +
          '<div class="card-en">' + escHtml(d.en) + '</div>' +
          '<div class="card-hint">点击翻回</div>' +
          '<button class="speak-btn-front" onclick="speakText(event,\'' + escJs(d.en) + '\')" title="朗读">🔈</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function updateDash(tab) {
  var items = DATA.filter(function(d, i) { return d.tab === tab && !deletedIds[getCardId(d, i)]; });
  var total = items.length;
  var done = items.filter(function(d, i) {
    var idx = DATA.indexOf(d);
    return tagStates[getCardId(d, idx)] === 'done';
  }).length;
  var star = items.filter(function(d, i) {
    var idx = DATA.indexOf(d);
    return tagStates[getCardId(d, idx)] === 'star';
  }).length;
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  var tEl = document.getElementById('dash-total-' + tab);
  var dEl = document.getElementById('dash-done-' + tab);
  var sEl = document.getElementById('dash-star-' + tab);
  var bEl = document.getElementById('dash-bar-' + tab);
  if (tEl) tEl.textContent = total;
  if (dEl) dEl.textContent = done;
  if (sEl) sEl.textContent = star;
  if (bEl) bEl.style.width = pct + '%';
}

function renderTopics() {
  var list = document.getElementById('topics-list');
  if (!list) return;
  var html = '';
  TOPICS.forEach(function(t, i) {
    html += '<div class="topic-card">' +
      '<div class="topic-date">📅 ' + t.date + '</div>' +
      '<div class="topic-title">' + escHtml(t.title) + '</div>' +
      '<div class="topic-body" id="topic-body-' + i + '">' + escHtml(t.body) + '</div>' +
      '<div class="topic-actions">' +
        '<button class="topic-btn topic-btn-speak" id="topic-speak-btn-' + i + '" onclick="speakTopic(' + i + ')">🔈 朗读全文</button>' +
        '<button class="topic-btn topic-btn-copy" onclick="copyTopic(' + i + ')">📋 复制</button>' +
      '</div>' +
    '</div>';
  });
  list.innerHTML = html;
}

// ============================================================
// Actions
// ============================================================
function flipCard(id) {
  var el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('flipped');
}

function tagCard(e, id, type) {
  e.stopPropagation();
  var cur = tagStates[id] || '';
  var newTag = (cur === type) ? '' : type;
  tagStates[id] = newTag;
  saveState('tags', tagStates);
  // Update all matching cards (front and back)
  var allWraps = document.querySelectorAll('[data-id="' + id + '"]');
  allWraps.forEach(function(wrap) {
    var starBtns = wrap.querySelectorAll('.card-action-btn');
    starBtns.forEach(function(btn) {
      btn.classList.remove('tagged-star', 'tagged-done');
    });
    if (newTag === 'star') {
      wrap.querySelectorAll('.card-action-btn:first-child').forEach(function(b) { b.classList.add('tagged-star'); });
    } else if (newTag === 'done') {
      wrap.querySelectorAll('.card-action-btn:nth-child(2)').forEach(function(b) { b.classList.add('tagged-done'); });
    }
  });
  updateDash(currentTab);
  if (newTag === 'done') showToast('✅ 已标记为掌握');
  else if (newTag === 'star') showToast('⭐ 已标记为重要');
  else showToast('标记已取消');
}

function deleteCard(e, id) {
  e.stopPropagation();
  deletedIds[id] = true;
  saveState('deleted', deletedIds);
  var wrap = document.querySelector('[data-id="' + id + '"]');
  if (wrap) wrap.remove();
  updateDash(currentTab);
  showToast('🗑 已删除');
}

function speakText(e, text) {
  e.stopPropagation();
  if (!window.speechSynthesis) { showToast('当前浏览器不支持朗读'); return; }
  window.speechSynthesis.cancel();
  var btn = e.currentTarget;
  btn.classList.add('speaking');
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.9;
  utter.onend = function() { btn.classList.remove('speaking'); };
  utter.onerror = function() { btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(utter);
}

function speakTopic(i) {
  var body = document.getElementById('topic-body-' + i);
  var btn = document.getElementById('topic-speak-btn-' + i);
  if (!body || !window.speechSynthesis) { showToast('当前浏览器不支持朗读'); return; }
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    if (btn) { btn.textContent = '🔈 朗读全文'; btn.classList.remove('speaking'); }
    return;
  }
  var utter = new SpeechSynthesisUtterance(body.textContent);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  if (btn) { btn.textContent = '⏹ 停止朗读'; btn.classList.add('speaking'); }
  utter.onend = utter.onerror = function() {
    if (btn) { btn.textContent = '🔈 朗读全文'; btn.classList.remove('speaking'); }
  };
  window.speechSynthesis.speak(utter);
}

function copyTopic(i) {
  var t = TOPICS[i];
  var text = t.title + '\n\n' + t.body;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('📋 已复制到剪贴板'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('📋 已复制到剪贴板');
  }
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p, i) {
    p.classList.toggle('active', i === idx);
  });
  if (idx < 3) filterCards(idx);
}

function toggleListenMode() {
  listenMode = !listenMode;
  document.body.classList.toggle('listen-mode', listenMode);
  var btn = document.getElementById('btnListen');
  if (btn) btn.classList.toggle('active', listenMode);
  showToast(listenMode ? '👂 听力模式已开启' : '👁 听力模式已关闭');
}

function toggleStarFilter() {
  starOnly = !starOnly;
  var btn = document.getElementById('btnStarOnly');
  if (btn) btn.classList.toggle('active', starOnly);
  for (var t = 0; t < 3; t++) filterCards(t);
  showToast(starOnly ? '⭐ 只显示重要词句' : '全部词句');
}

// Toast
// ============================================================
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ============================================================
// Utils
// ============================================================
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escJs(s) {
  return (s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// Init
// ============================================================
renderCards(0);
renderCards(1);
renderCards(2);
renderTopics();

// PWA service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
